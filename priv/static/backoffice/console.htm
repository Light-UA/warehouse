<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Консоль підтримки — перегляд інцидентів ITSM" />
    <title>КОНСОЛЬ ПІДТРИМКИ</title>
    <link rel="stylesheet" href="../css/blank.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <style>
        .console-layout {
            display: flex;
            gap: 0;
            height: calc(100vh - 56px);
            overflow: hidden;
        }
        .console-queue {
            width: 260px;
            min-width: 220px;
            flex-shrink: 0;
            border-right: 1px solid var(--border-color, #e2e8f0);
            overflow-y: auto;
            padding: 16px 12px;
            background: var(--bg-primary, #f8fafc);
        }
        .console-detail {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: var(--bg-card, #fff);
        }
        .console-sidebar {
            width: 270px;
            min-width: 230px;
            flex-shrink: 0;
            border-left: 1px solid var(--border-color, #e2e8f0);
            overflow-y: auto;
            padding: 16px 14px;
            background: var(--bg-primary, #f8fafc);
        }
        .console-queue h3,
        .console-sidebar h3 {
            font-size: 0.78em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #94a3b8;
            margin: 0 0 14px;
        }
        .detail-section-title {
            font-size: 0.78em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #94a3b8;
            margin: 18px 0 6px;
        }
        .workflow-panel {
            background: var(--bg-primary, #f8fafc);
            border-radius: 8px;
            padding: 14px 16px;
            margin-top: 18px;
        }
        .workflow-panel h4 {
            margin: 0 0 10px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }
    </style>
</head>

<body>

    <nav>
        <a href='console.htm' style="background:#ededed;">КОНСОЛЬ</a>
        <a href='itsm_services.htm'>СЕРВІСИ</a>
        <a href='itsm_incidents.htm'>ІНЦИДЕНТИ</a>
        <a href='itsm_changes.htm'>ЗМІНИ</a>
        <a href='tariffs.htm'>ТАРИФИ</a>
        <a href='domains.htm'>РОЛІ</a>
        <a href='reports.htm'>ЗВІТНІСТЬ</a>
        <a href='../login.htm'>ВИХІД</a>
    </nav>

    <div class="console-layout">

        <!-- LEFT: Incident queue -->
        <aside class="console-queue">
            <h3>Черга інцидентів</h3>
            <div id="ticketsQueue">Завантаження...</div>
        </aside>

        <!-- CENTRE: Incident detail + BPE workflow -->
        <main class="console-detail">
            <h2 style="margin: 0 0 16px; font-size: 1.1em;">Деталі інциденту</h2>
            <div id="ticketDetail" style="min-height: 160px; color: #94a3b8; font-size: 0.9em;">
                Оберіть інцидент зі списку ліворуч.
            </div>

            <div class="workflow-panel">
                <h4>Прогрес BPE / Дії</h4>
                <div id="workflowActions" style="color: #94a3b8; font-size: 0.9em;">—</div>
            </div>
        </main>

        <!-- RIGHT: Client / contract / billing sidebar -->
        <aside class="console-sidebar">
            <h3>Профіль клієнта</h3>
            <div id="clientBillingInfo" style="color: #94a3b8; font-size: 0.9em;">
                Оберіть інцидент для відображення даних.
            </div>
        </aside>

    </div>

    <footer style="clear: both; text-align: center; padding: 20px 0; font-size: 0.82em; color: #94a3b8; border-top: 1px solid var(--border-color, #e2e8f0);">
        Зроблено з любов'ю <span class="heart">❤</span> до BPE |
        <a href="../admin/bpe.htm" style="color: #94a3b8; text-decoration: none;">⚙️ Адміністрування BPE</a>
    </footer>

    <script src='https://ws.n2o.dev/priv/utf8.js'></script>
    <script src='https://ws.n2o.dev/priv/bert.js'></script>
    <script src='https://ws.n2o.dev/priv/heart.js'></script>
    <script src='https://ws.n2o.dev/priv/ieee754.js'></script>
    <script src='https://ws.n2o.dev/priv/n2o.js'></script>
    <script src='https://ws.n2o.dev/priv/ftp.js'></script>
    <script src='https://nitro.n2o.dev/priv/js/nitro.js'></script>
    <script>host = location.hostname; port = 8051;</script>
    <script>protos = [$bert]; N2O_start();</script>

</body>

</html>
